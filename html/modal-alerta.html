<!-- Modal de Sistema de Alertas de Emergencia -->
<div id="ventanaAlerta" style="
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    color: white;
    font-size: 24px;
    text-align: center;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 10000;
    backdrop-filter: blur(5px);
">
    <div style="
        background: linear-gradient(135deg, #e74c3c, #c0392b);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(231, 76, 60, 0.5);
        max-width: 90%;
        animation: pulseAlert 1s infinite;
    ">
        <i class="fa-solid fa-triangle-exclamation" style="font-size: 4rem; margin-bottom: 20px; animation: shake 0.5s infinite;"></i>
        
        <p id="contadorTexto" style="
            font-size: 1.5rem;
            font-weight: bold;
            margin: 20px 0;
            line-height: 1.5;
        ">
            ⚠️ Enviando alerta en 10 segundos
        </p>
        
        <p style="
            font-size: 0.9rem;
            color: #ecf0f1;
            margin-bottom: 30px;
        ">
            Se enviará tu ubicación y una alerta de emergencia
        </p>
        
        <button onclick="cancelarAlerta()" style="
            font-size: 1.2rem;
            padding: 15px 40px;
            background: white;
            color: #e74c3c;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s;
        " onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
            <i class="fa-solid fa-xmark"></i> Cancelar Alerta
        </button>
    </div>
</div>

<!-- Indicador de estado del sistema de alertas -->
<div id="estado-alerta" style="
    display: none;
    position: fixed;
    bottom: 110px;
    right: 20px;
    background: #2ecc71;
    color: white;
    padding: 12px 20px;
    border-radius: 25px;
    font-size: 0.85rem;
    font-weight: bold;
    z-index: 999;
    box-shadow: 0 4px 15px rgba(46, 204, 113, 0.4);
    transition: all 0.3s;
    cursor: pointer;
    user-select: none;
" onclick="toggleSistemaAlertas()" title="Click para encender/apagar">
    Sistema activo 📱
</div>

<style>
/* Ajustar posición del botón según el tamaño de pantalla */
@media (max-width: 600px) {
    #estado-alerta {
        bottom: 130px !important; /* Más arriba en celulares */
    }
}

@media (min-width: 601px) {
    #estado-alerta {
        bottom: 90px !important; /* Más abajo en PC */
    }
}

@keyframes pulseAlert {
    0%, 100% {
        transform: scale(1);
    }
    50% {
        transform: scale(1.02);
    }
}

@keyframes shake {
    0%, 100% {
        transform: translateX(0);
    }
    25% {
        transform: translateX(-5px);
    }
    75% {
        transform: translateX(5px);
    }
}
</style>
